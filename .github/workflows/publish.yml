name: Publish to PyPI

on:
  push:
    branches:
      - release

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          pip install "build==1.2.2"
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f9a3dc20fde4f6ca1b3e282448a  # release/v1
